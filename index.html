<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shetland Podcast | Coming Soon</title>
    <style>
        :root {
            --bg-deep: #041423;
            --bg-mid: #0e2b43;
            --bg-soft: #174b63;
            --ink: #f6f4ef;
            --muted: #cdd7dd;
            --accent: #ffd166;
            --accent-2: #70e3c1;
            --card: rgba(6, 24, 38, 0.66);
            --ring: rgba(255, 209, 102, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 16% 24%, rgba(112, 227, 193, 0.25), transparent 40%),
                radial-gradient(circle at 84% 18%, rgba(255, 209, 102, 0.2), transparent 42%),
                linear-gradient(145deg, var(--bg-deep), var(--bg-mid) 55%, var(--bg-soft));
            overflow-x: hidden;
        }

        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.06;
            background-image: radial-gradient(rgba(255, 255, 255, 0.95) 0.6px, transparent 0.7px);
            background-size: 3px 3px;
        }

        .page {
            position: relative;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }

        .card {
            width: min(920px, 100%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: var(--card);
            backdrop-filter: blur(8px);
            border-radius: 26px;
            padding: clamp(1.5rem, 4vw, 3rem);
            box-shadow:
                0 24px 40px rgba(0, 0, 0, 0.36),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .card::before,
        .card::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .card::before {
            width: 340px;
            height: 340px;
            right: -140px;
            bottom: -160px;
            background: radial-gradient(circle, rgba(255, 209, 102, 0.42), transparent 65%);
        }

        .card::after {
            width: 280px;
            height: 280px;
            left: -110px;
            top: -125px;
            background: radial-gradient(circle, rgba(112, 227, 193, 0.34), transparent 62%);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.24);
            color: var(--muted);
            border-radius: 999px;
            padding: 0.4rem 0.9rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.72rem;
            margin-bottom: 1rem;
        }

        .dot {
            width: 0.5rem;
            aspect-ratio: 1;
            border-radius: 50%;
            background: var(--accent-2);
            box-shadow: 0 0 0 0 var(--ring);
            animation: ping 1.8s infinite;
        }

        h1 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2rem, 6.5vw, 4rem);
            line-height: 0.98;
            letter-spacing: 0.02em;
            text-wrap: balance;
            max-width: 11ch;
        }

        .accent {
            color: var(--accent);
        }

        .subtitle {
            margin-top: 1rem;
            max-width: 80ch;
            color: var(--muted);
            line-height: 1.6;
            font-size: clamp(0.98rem, 1.8vw, 1.08rem);
        }

        .grid {
            margin-top: 1.8rem;
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 1.2rem;
            align-items: stretch;
        }

        .panel {
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 1rem 1.1rem;
        }

        .panel h2 {
            font-size: 0.92rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #e5ecef;
            margin-bottom: 0.65rem;
        }

        .wave {
            display: flex;
            align-items: flex-end;
            gap: 0.42rem;
            height: 82px;
        }

        .bar {
            width: 9px;
            border-radius: 99px;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
            transform-origin: bottom;
            animation: bounce 1.4s ease-in-out infinite;
            opacity: 0.9;
        }

        .bar:nth-child(2n) {
            animation-duration: 1.1s;
        }

        .bar:nth-child(3n) {
            animation-duration: 1.7s;
        }

        .bar:nth-child(4n) {
            animation-duration: 1.25s;
        }

        .soon-note {
            color: var(--muted);
            line-height: 1.6;
            font-size: 0.98rem;
            margin-top: 0.2rem;
        }

        .foot {
            margin-top: 1.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .chip {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            padding: 0.38rem 0.82rem;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .float {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            filter: blur(0.3px);
            animation: drift linear infinite;
            pointer-events: none;
        }

        @keyframes bounce {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }

        @keyframes ping {
            0% {
                box-shadow: 0 0 0 0 var(--ring);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(255, 209, 102, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 209, 102, 0);
            }
        }

        @keyframes drift {
            from {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            20%, 80% {
                opacity: 1;
            }
            to {
                transform: translateY(-120vh) translateX(18px);
                opacity: 0;
            }
        }

        @media (max-width: 780px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .foot {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="noise" aria-hidden="true"></div>
    <main class="page">
        <section class="card" aria-labelledby="title">
            <p class="badge"><span class="dot" aria-hidden="true"></span> New show in production</p>
            <h1 id="title">The Shetland <span class="accent">Podcast</span></h1>
            <p class="subtitle">
                Tune in soon for conversations, culture, and coastal life from the Shetland Isles.
            </p>

            <div class="grid">
                <div class="panel" aria-label="Audio visual">
                    <h2>Podcast recording</h2>
                    <div class="wave" id="wave"></div>
                </div>

                <div class="panel" aria-label="Coming soon information">
                    <h2>Coming Soon</h2>
                    <p class="soon-note">No launch date yet. Updates and first-episode announcements will be shared here soon.</p>
                </div>
            </div>

            <!-- <div class="foot">
                <p>Launching soon.</p>
                <span class="chip">Shetland Isles</span>
            </div> -->
        </section>
    </main>

    <script>
        const wave = document.getElementById("wave");
        for (let i = 0; i < 20; i += 1) {
            const bar = document.createElement("span");
            bar.className = "bar";
            bar.style.height = `${18 + Math.random() * 56}px`;
            bar.style.animationDelay = `${Math.random() * 1.4}s`;
            wave.appendChild(bar);
        }

        for (let i = 0; i < 12; i += 1) {
            const bubble = document.createElement("span");
            bubble.className = "float";
            bubble.style.left = `${Math.random() * 100}%`;
            bubble.style.bottom = `${-20 - Math.random() * 40}px`;
            bubble.style.animationDuration = `${14 + Math.random() * 18}s`;
            bubble.style.animationDelay = `${Math.random() * 12}s`;
            bubble.style.transform = `scale(${0.5 + Math.random()})`;
            document.body.appendChild(bubble);
        }
    </script>
</body>
</html>
